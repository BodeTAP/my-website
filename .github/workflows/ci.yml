name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
      AUTH_SECRET: ci-secret-for-build-only
      NEXT_PUBLIC_SITE_URL: https://example.com
      GOOGLE_CLIENT_ID: dummy-client-id
      GOOGLE_CLIENT_SECRET: dummy-client-secret
      AUTH_RESEND_KEY: re_dummy_key
      EMAIL_FROM: noreply@example.com
      TRIPAY_API_KEY: dummy-tripay-key
      TRIPAY_MERCHANT_CODE: dummy-merchant
      TRIPAY_SANDBOX: "true"
      BLOB_READ_WRITE_TOKEN: vercel_blob_rw_dummy
      ANTHROPIC_API_KEY: sk-ant-dummy
      PEXELS_API_KEY: dummy-pexels-key
      NEXT_PUBLIC_SENTRY_DSN: https://dummy@sentry.io/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts','**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
      - run: npm run build
